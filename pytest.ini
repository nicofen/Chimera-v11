[pytest]
# Project Chimera — pytest configuration

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests that touch multiple modules
    live: marks tests that require real API credentials (skip in CI)

# Default options
addopts =
    --tb=short
    --strict-markers
    -q

# Coverage (requires pytest-cov: pip install pytest-cov)
# Run with: pytest --cov=chimera --cov-report=term-missing
